{{ define "main" }}
  {{ partial "title.html" . }}
  <section class="galleries">
    {{/* .Pages includes both sub-folders (sections) and individual items */}}
    {{ range .Pages }}
      {{ partial "album-card.html" . }}
    {{ end }}
  </section>

  {{ with .Params.tags }}
    <div class="album-tags">
      {{ range . }}
        <a href="{{ "tags/" | relLangURL }}{{ . | urlize }}" class="tag-link">#{{ . }}</a>
      {{ end }}
    </div>
  {{ end }}
{{ end }}
